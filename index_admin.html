<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin - Online</title><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><link rel="stylesheet" href="./styles.css"></head><body><div class="wrap">
<h1 id="eventTitleView">Cronograma de pista</h1><div class="sub">Versão online com Firebase.</div>
<div class="topstats"><div class="card"><div class="small">Colunas</div><div class="stat" id="statUnits">0</div></div><div class="card"><div class="small">Tarefas</div><div class="stat" id="statTasks">0</div></div><div class="card"><div class="small">Pendentes</div><div class="stat" id="statPending">0</div></div><div class="card"><div class="small">Concluídas</div><div class="stat" id="statDone">0</div></div></div>

<div class="card" style="margin-bottom:14px">
  <label>Título principal</label><input id="eventTitleInput">
  <div class="grid2" style="margin-top:10px">
    <div><label>Logo esquerdo (arquivo)</label><input id="leftLogoFile" type="file" accept="image/*"><button id="uploadLeftLogo" class="btn" style="margin-top:8px">Enviar logo esquerdo</button><div id="logoLeftPreview" class="logoBox" style="margin-top:8px">Sem logo</div></div>
    <div><label>Logo direito (arquivo)</label><input id="rightLogoFile" type="file" accept="image/*"><button id="uploadRightLogo" class="btn" style="margin-top:8px">Enviar logo direito</button><div id="logoRightPreview" class="logoBox" style="margin-top:8px">Sem logo</div></div>
  </div>
</div>

<div class="grid2">
  <div class="card">
    <div class="title">Cadastro de colunas</div>
    <label>Tipo</label><select id="unitType"><option value="car">Carro</option><option value="other">Outra coluna</option></select>
    <div id="carFields"><label style="margin-top:8px">Número do carro</label><input id="unitNumber"><label style="margin-top:8px">Piloto</label><input id="unitDriver"></div>
    <div id="otherFields" class="hidden"><label style="margin-top:8px">Nome da coluna</label><input id="unitName"></div>
    <div class="grid3" style="margin-top:8px"><div><label>Cor do cabeçalho</label><input id="unitBg" type="color" value="#18181b"></div><div><label>Cor da letra</label><input id="unitTextColor" type="color" value="#ffffff"></div><div><label>Cor do piloto</label><input id="unitPilotColor" type="color" value="#ffffff"></div></div>
    <div style="margin-top:10px"><button id="saveUnit" class="btn dark">Salvar coluna</button></div>
    <div id="unitsList"></div>
  </div>
  <div class="card">
    <div class="title">Cadastro de membros</div>
    <label>Nome</label><input id="memberName"><label style="margin-top:8px">Função</label><input id="memberRole">
    <div style="margin-top:10px"><button id="saveMember" class="btn dark">Salvar membro</button></div>
    <div id="membersList"></div>
  </div>
</div>

<div class="grid2" style="margin-top:14px">
  <div class="card">
    <div class="title">Cadastro de sessões</div>
    <label>Nome da sessão</label><input id="sessionName">
    <label style="margin-top:8px">Início</label><input id="sessionStart" type="datetime-local">
    <label style="margin-top:8px">Fim</label><input id="sessionEnd" type="datetime-local">
    <div style="margin-top:10px"><button id="saveSession" class="btn dark">Salvar sessão</button></div>
    <div id="sessionsList"></div>
  </div>
  <div class="card">
    <div class="title">Geração de tarefas</div>
    <label>Título da tarefa</label><input id="taskTitle">
    <label style="margin-top:8px">Responsáveis</label><div id="taskOwners" class="checklist"></div>
    <div class="grid2" style="margin-top:8px"><div><label>Coluna</label><select id="taskUnit"></select></div><div><label>Sessão (pode deixar em branco)</label><select id="taskSession"></select></div></div>
    <label style="margin-top:8px">Horário da tarefa</label><input id="taskDue" type="datetime-local">
    <label style="margin-top:8px">Descrição</label><textarea id="taskDesc"></textarea>
    <div style="margin-top:10px"><button id="saveTask" class="btn dark">Salvar tarefa</button></div>
  </div>
</div>

<div class="grid2" style="margin-top:14px">
  <div class="card">
    <div class="title">QR Code para crachá</div>
    <label>Selecione o membro</label><select id="memberQrSelect"></select>
    <div id="memberQr" class="qr" style="margin-top:10px"></div>
    <div id="memberQrLink" class="small" style="margin-top:10px;word-break:break-all"></div>
  </div>
  <div class="card">
    <div class="title">Documentos PDF</div>
    <label>Nome do documento</label><input id="docName" placeholder="Regulamento, resumo, etc">
    <label style="margin-top:8px">PDF</label><input id="docFile" type="file" accept="application/pdf">
    <label style="margin-top:8px">Liberar para estes membros</label><div id="docPermissions" class="checklist"></div>
    <div style="margin-top:10px"><button id="saveDoc" class="btn dark">Enviar PDF</button></div>
    <div id="docsList"></div>
  </div>
</div>

<div class="card" style="margin-top:14px"><div class="title">Lista geral de tarefas</div><div id="tasksList"></div></div>
<script type="module" src="./js/admin.js"></script></body></html>
