<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Membro - Cronograma de Pista</title>
  <link rel="stylesheet" href="./member.css">
</head>
<body>
  <div class="wrap">
    <h1 id="eventTitleView">Cronograma de pista</h1>
    <div class="sub">Visão do membro da equipe.</div>

    <div class="tabsBar">
      <button class="tabBtn active" data-tab="tab-tarefas">Minhas tarefas</button>
      <button class="tabBtn" data-tab="tab-sessoes">Sessões</button>
      <button class="tabBtn" data-tab="tab-docs">Documentos</button>
    </div>

    <div class="memberTop">
      <div class="card">
        <label>Selecione o membro</label>
        <select id="memberSelect"></select>
      </div>
      <div class="card">
        <div class="small">Próxima tarefa</div>
        <div id="nextTaskBox" class="nextTaskBox">Nenhuma tarefa encontrada</div>
      </div>
    </div>

    <section id="tab-tarefas" class="tabPanel active">
      <div class="card">
        <div class="title">Minhas tarefas</div>
        <div id="memberTasks"></div>
      </div>
    </section>

    <section id="tab-sessoes" class="tabPanel">
      <div class="card">
        <div class="title">Próximas sessões</div>
        <div id="sessionsPanel"></div>
      </div>
    </section>

    <section id="tab-docs" class="tabPanel">
      <div class="card">
        <div class="title">Documentos liberados</div>
        <div id="docsPanel"></div>
      </div>
    </section>
  </div>

  <script type="module" src="./js/membro.js"></script>
</body>
</html>
